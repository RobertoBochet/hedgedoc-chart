name: "Publish chart"

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-chart:
    name: "Build chart"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set chart version
        run: |
          VERSION="${GITHUB_REF/refs\/tags\//}"
          VERSION="${VERSION/v/}"
          sed -i "s|^version:.*|version:\ \"${VERSION}\"|g" Chart.yaml
      - name: Helm tool installer
        uses: Azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: "3.16.3"
      - name: Build chart
        run: |
          helm dependency update
          helm package .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: charts
          path: "*.tgz"

  publish-chart:
    name: "Publish chart to owner repository"
    runs-on: ubuntu-latest
    needs: build-chart
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: '${{ github.repository_owner }}/charts'
          ref: 'charts'
          token: '${{ secrets.CHARTS_REPO_TOKEN }}'
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: charts
      - name: Push chart
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git add *.tgz
          export CHART_FILENAMES="$(git --no-pager diff --name-only --cached -- '*.tgz' | tr '\n' ' ')"
          git commit -m "Add ${CHART_FILENAMES}"
          git push origin charts

  create-release:
    name: "Create release on GitHub"
    runs-on: ubuntu-latest
    needs: build-chart
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: charts
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: "*.tgz"
          generate_release_notes: true
          make_latest: true
