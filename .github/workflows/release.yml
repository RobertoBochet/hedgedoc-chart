name: "Publish chart"

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-chart:
    name: "Build chart"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set chart version
        run: |
          VERSION="${GITHUB_REF/refs\/tags\//}"
          VERSION="${VERSION/v/}"
          sed -i "s|^version:.*|version:\ \"${VERSION}\"|g" Chart.yaml
      - name: Helm tool installer
        uses: Azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - name: Build chart
        run: |
          helm dependency update
          helm package .
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: charts
          path: "*.tgz"

  publish-chart:
    name: "Publish chart to owner repository"
    runs-on: ubuntu-latest
    needs: build-chart
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: '${{ github.repository_owner }}/charts'
          ref: 'charts'
          token: '${{ secrets.CHARTS_REPO_TOKEN }}'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: charts
      - name: Push chart
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git add *.tgz
          export CHART_FILENAMES="$(git --no-pager diff --name-only --cached -- '*.tgz' | tr '\n' ' ')"
          git commit -m "Add ${CHART_FILENAMES}"
          git push origin charts

  create-release:
    name: "Create release on GitHub"
    runs-on: ubuntu-latest
    needs: build-chart
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: charts
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: "*.tgz"
          generate_release_notes: true
          make_latest: true
